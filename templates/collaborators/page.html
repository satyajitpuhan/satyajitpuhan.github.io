{% extends "base.html" %}

{% block content %}
<section class="section collaborator-details" style="padding: 120px 0 80px; min-height: 80vh; background-image: url('/images/flowers/flower2.jpg'); background-size: cover; background-position: center; position: relative;">
    <div style="position: absolute; inset: 0; background: rgba(15, 23, 42, 0.85); pointer-events: none;"></div>
    <div class="container" style="position: relative; z-index: 1;">
        <div class="row mb-4">
            <div class="col-lg-12">
                <a href="{{ get_url(path='/#collaborators') }}" class="btn btn-outline-light mb-4" style="border-radius: 20px; padding: 6px 16px;"><i class="lni lni-arrow-left"></i> Back to Home</a>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card text-center" style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 30px 20px;">
                    {% if page.extra.image %}
                    <img src="{{ get_url(path=page.extra.image) }}" alt="{{ page.title }}" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: 0 auto 20px; border: 4px solid rgba(255,255,255,0.2);">
                    {% else %}
                    <div style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 4px solid rgba(255,255,255,0.2);">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    {% endif %}
                    <h2 style="color: white; font-weight: 800; font-size: 1.8rem; margin-bottom: 5px;">{{ page.title }}</h2>
                    <h5 style="color: #f39c12; font-weight: 600; margin-bottom: 10px;">{{ page.description }}</h5>
                    <p style="color: #e2e8f0; font-size: 0.95rem; margin-bottom: 20px;"><i class="lni lni-apartment"></i> {{ page.extra.institution }}</p>
                    
                    {% if page.extra.website %}
                    <a href="{{ page.extra.website }}" target="_blank" class="btn btn-primary" style="background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); border: none; border-radius: 8px; width: 100%; font-weight: 600;"><i class="lni lni-website"></i> Visit Website</a>
                    {% endif %}
                </div>
            </div>
            
            <div class="col-lg-8">
                <div class="card" style="background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px); border: none; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
                    <div class="collaborator-content" style="color: #1e293b; line-height: 1.7; font-size: 1.05rem;">
                        {{ page.content | safe }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
