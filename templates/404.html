<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satyajit Puhan</title>
    <meta name="description" content="We hide not from society from our own demon.">
    <meta name="theme-color" content="#050911">
    <link rel="shortcut icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@500;700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background: #050911;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg-canvas { position: fixed; inset: 0; z-index: 0; }
        .bg-canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 40%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 60%, rgba(6, 182, 212, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(232, 164, 68, 0.04) 0%, transparent 70%);
            animation: nebulaPulse 12s ease-in-out infinite alternate;
        }
        @keyframes nebulaPulse { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }

        .noise {
            position: fixed; inset: 0; z-index: 1; opacity: 0.03; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px 256px;
        }

        .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
        .particle {
            position: absolute; width: 2px; height: 2px;
            background: rgba(255, 255, 255, 0.15); border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) translateX(10px) scale(1); }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(-20px) scale(0.3); opacity: 0; }
        }

        .content {
            position: relative; z-index: 10; text-align: center;
            padding: 40px 24px; max-width: 720px;
            animation: fadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.97); filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .accent-line {
            width: 60px; height: 2px; margin: 0 auto 40px;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.6), rgba(6, 182, 212, 0.6), transparent);
            border-radius: 2px; animation: lineGlow 4s ease-in-out infinite alternate;
        }
        @keyframes lineGlow { 0% { opacity: 0.4; width: 40px; } 100% { opacity: 1; width: 80px; } }

        .quote {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2.8rem); font-weight: 700;
            line-height: 1.3; letter-spacing: -0.5px;
            color: rgba(255, 255, 255, 0.92); margin-bottom: 32px; position: relative;
        }
        .quote .highlight { background: linear-gradient(135deg, #8b5cf6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .quote .highlight-warm { background: linear-gradient(135deg, #e8a444, #f5c266); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .quote::before {
            content: '"'; position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 5rem; font-family: Georgia, serif;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(6, 182, 212, 0.1));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1; pointer-events: none; user-select: none;
        }

        .attribution { font-size: 0.85rem; color: rgba(255, 255, 255, 0.3); font-weight: 300; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 48px; }
        .bottom-line { width: 40px; height: 1px; margin: 0 auto; background: linear-gradient(90deg, transparent, rgba(232, 164, 68, 0.4), transparent); border-radius: 1px; }

        .glow-orb {
            position: absolute; width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08), transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: breathe 6s ease-in-out infinite; pointer-events: none; z-index: -1;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } }

        .cursor { display: inline-block; width: 2px; height: 0.85em; background: rgba(139, 92, 246, 0.7); margin-left: 4px; vertical-align: text-bottom; animation: blink 1.2s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @media (max-width: 480px) { .quote::before { font-size: 3rem; top: -20px; } }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>
    <div class="noise"></div>
    <div class="particles" id="particles"></div>
    <div class="content">
        <div class="glow-orb"></div>
        <div class="accent-line"></div>
        <p class="quote">
            We hide not from <span class="highlight">society</span><br>
            from our own <span class="highlight-warm">demon</span><span class="cursor"></span>
        </p>
        <div class="attribution">— S . P</div>
        <div class="bottom-line"></div>
    </div>
    <script>
        (function() {
            var c = document.getElementById('particles');
            if (!c) return;
            for (var i = 0; i < 40; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (8 + Math.random() * 16) + 's';
                p.style.animationDelay = (Math.random() * 12) + 's';
                p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
                p.style.opacity = 0.05 + Math.random() * 0.15;
                c.appendChild(p);
            }
        })();
    </script>
</body>
</html>
