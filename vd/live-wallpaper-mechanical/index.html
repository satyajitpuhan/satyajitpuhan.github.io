<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pion Mechanical Properties - LFQM Visualization of pressure, shear, and energy distributions">
    <title>Pion Mechanical Distribution — LFQM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Main Physics Canvas -->
    <canvas id="physics-canvas"></canvas>

    <!-- UI Overlay -->
    <div class="ui-overlay" id="ui-overlay">
        <!-- Title -->
        <div class="title-bar glass-card" id="title-bar">
            <h1>Pion Mechanical Structure</h1>
            <p class="subtitle">Light-Front Quark Model (LFQM)</p>
        </div>

        <!-- Model Parameters Panel -->
        <div class="params-panel glass-card" id="params-panel">
            <div class="panel-title">LFQM Parameters</div>
            <div class="control-group">
                <label for="beta-slider">β (GeV)</label>
                <div class="slider-row">
                    <input type="range" id="beta-slider" min="0.20" max="0.55" step="0.005" value="0.3659">
                    <span class="slider-value" id="beta-value">0.366</span>
                </div>
            </div>
            <div class="control-group">
                <label for="mq-slider">m<sub>q</sub> (GeV)</label>
                <div class="slider-row">
                    <input type="range" id="mq-slider" min="0.15" max="0.35" step="0.005" value="0.220">
                    <span class="slider-value" id="mq-value">0.220</span>
                </div>
            </div>
            <div class="param-readouts">
                <div class="readout"><span class="readout-label">D(0)</span><span class="readout-val" id="d0-val">−1.00</span></div>
                <div class="readout"><span class="readout-label">⟨b²⟩<sub>mass</sub></span><span class="readout-val" id="rmass-val">0.32 fm²</span></div>
            </div>
        </div>

        <!-- Legend Panel -->
        <div class="legend-panel glass-card" id="legend-panel">
            <div class="legend-item"><span class="legend-color" style="background: #ff6b4a;"></span> Repulsive core (p &gt; 0)</div>
            <div class="legend-item"><span class="legend-color" style="background: #4ac8ff;"></span> Attractive hull (p &lt; 0)</div>
            <div class="legend-item"><span class="legend-color" style="background: #a78bfa;"></span> Mass Form Factor A(t)</div>
            <div class="legend-item"><span class="legend-color" style="background: #ffcf48;"></span> D-term Form Factor D(t)</div>
        </div>

        <!-- Toggle Button -->
        <button class="toggle-ui glass-card" id="toggle-ui" title="Toggle UI">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>

        <!-- Fullscreen -->
        <button class="fullscreen-btn glass-card" id="fullscreen-btn" title="Fullscreen">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
            </svg>
        </button>
    </div>

    <script src="mechanical.js"></script>
</body>
</html>
