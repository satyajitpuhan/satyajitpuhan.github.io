<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Instant Form vs Front Form Kinematics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <style>
    :root {
      --if-color-primary: #8affb2;
      --if-color-glow: rgba(138, 255, 178, 0.4);
      --if-bg: #0d1a13;
      
      --ff-color-primary: #2ac3f9;
      --ff-color-glow: rgba(42, 195, 249, 0.4);
      --ff-bg: #121828;
    }
    
    html, body {
      margin: 0; padding: 0; 
      width: 100vw; height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
    }

    .pane {
      position: relative;
      flex: 1;
      height: 100%;
      overflow: hidden;
    }

    #pane-if { background: var(--if-bg); border-right: 2px solid rgba(255,255,255,0.1); }
    #pane-ff { background: var(--ff-bg); }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
    }

    .title-container {
      position: absolute;
      top: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      pointer-events: none;
      width: 100%;
    }

    .title {
      font-size: 2vw; font-weight: 700;
      letter-spacing: 2px;
      user-select: none;
    }
    
    .subtitle {
      margin-top: 10px;
      font-size: 1vw; font-family: 'Consolas','Segoe UI',sans-serif;
      opacity: 0.93;
    }

    #title-if { color: #d4ffd4; text-shadow: 0 2px 22px rgba(138, 255, 178, 0.6); }
    #sub-if { color: #8affb2; text-shadow: 0 1px 13px rgba(138, 255, 178, 0.5); }

    #title-ff { color: #e2ebff; text-shadow: 0 2px 22px rgba(43, 194, 238, 0.6); }
    #sub-ff { color: #aaf9fc; text-shadow: 0 1px 13px rgba(108, 193, 234, 0.5); }

    /* Formula layer */
    .formula-layer {
      position: absolute; inset: 0; z-index: 50; pointer-events: none;
      opacity: 0; transition: opacity 400ms ease;
    }
    .formula {
      position: absolute;
      will-change: transform, opacity;
    }
    
    .formula-if { color: #e0ffd4; text-shadow: 0 0 12px rgba(138, 255, 178, 0.4); }
    .formula-ff { color: #ffd5d5; text-shadow: 0 0 12px rgba(255, 213, 213, 0.35); }

    .display { font-size: clamp(14px, 1.4vw, 28px); }
    .inline  { font-size: clamp(11px, 1vw, 22px); }

    /* Bottom center logo / legend */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <!-- Instant Form (Left) -->
  <div class="pane" id="pane-if">
    <div class="title-container">
      <div class="title" id="title-if">Instant Form</div>
      <div class="subtitle" id="sub-if"><span id="math-if"></span> &nbsp;|&nbsp; Equal-Time</div>
    </div>
    <canvas id="canvas-if"></canvas>
    <div class="formula-layer" id="formulas-if">
      <div class="formula formula-if display" id="if1"></div>
      <div class="formula formula-if display" id="if2"></div>
      <div class="formula formula-if display" id="if3"></div>
      <div class="formula formula-if inline" id="if4"></div>
      <div class="formula formula-if display" id="if5"></div>
      <div class="formula formula-if inline" id="if6"></div>
      <div class="formula formula-if display" id="if7"></div>
    </div>
  </div>

  <!-- Front Form (Right) -->
  <div class="pane" id="pane-ff">
    <div class="title-container">
      <div class="title" id="title-ff">Front Form</div>
      <div class="subtitle" id="sub-ff"><span id="math-ff"></span> &nbsp;|&nbsp; Light-Front</div>
    </div>
    <canvas id="canvas-ff"></canvas>
    <div class="formula-layer" id="formulas-ff">
      <div class="formula formula-ff display" id="ff1"></div>
      <div class="formula formula-ff display" id="ff2"></div>
      <div class="formula formula-ff display" id="ff3"></div>
      <div class="formula formula-ff inline" id="ff4"></div>
      <div class="formula formula-ff display" id="ff5"></div>
      <div class="formula formula-ff inline" id="ff6"></div>
      <div class="formula formula-ff display" id="ff7"></div>
    </div>
  </div>

  <div class="legend">Relativistic Dynamics Kinematics</div>

  <!-- KaTeX JS -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

  <script>
    const lerp = (a, b, t) => a + (b - a) * t;

    function renderMath() {
      // Subtitles
      katex.render(String.raw`x^{0} = t = \text{const}`, document.getElementById('math-if'), { displayMode: false });
      katex.render(String.raw`x^{+} = \frac{x^0+x^3}{\sqrt{2}} = \text{const}`, document.getElementById('math-ff'), { displayMode: false });

      // IF Formulas
      const ifMath = {
        if1: String.raw`p^2 = (p^0)^2 - \mathbf{p}^2 = M^2`,
        if2: String.raw`H \equiv P^0 = i \partial_t`,
        if3: String.raw`\Psi(t) = e^{-i H t} \Psi(0)`,
        if4: String.raw`\partial_\mu \partial^\mu = \partial_t^2 - \nabla^2`,
        if5: String.raw`\big[\phi(x), \partial_0 \phi(y)\big]_{x^0=y^0} = i\delta^{(3)}(\mathbf{x}-\mathbf{y})`,
        if6: String.raw`\int dt\,d^3\mathbf{x}\; \mathcal{L}(x)`,
        if7: String.raw`\langle \mathbf{p}' | \mathbf{p} \rangle = 2p^0 (2\pi)^3 \delta^{(3)}(\mathbf{p}'-\mathbf{p})`
      };
      
      // FF Formulas
      const ffMath = {
        ff1: String.raw`p^2 = p^+ p^- - \mathbf{p}_\perp^2 = M^2`,
        ff2: String.raw`H_{\mathrm{LF}} \equiv P^- = i \partial_-`,
        ff3: String.raw`\Psi(x^+) = e^{-i P^- x^+} \Psi(0)`,
        ff4: String.raw`\partial_\mu \partial^\mu = 2\partial_+\partial_- - \nabla_\perp^2`,
        ff5: String.raw`\big[\phi(x), \partial_- \phi(y)\big]_{x^+=y^+} = \frac{i}{4}\delta(x^- - y^-)\delta^{(2)}(\dots)`,
        ff6: String.raw`\int dx^{-}\,d^{2}\mathbf{x}_{\perp}\; \mathcal{L}_{\mathrm{LF}}(x)`,
        ff7: String.raw`\langle p' | p \rangle = 2p^+ (2\pi)^3 \delta(p^{\prime +}-p^+)\delta^{(2)}(\mathbf{p}'_\perp-\mathbf{p}_\perp)`
      };

      const displayIds = new Set(['if1','if2','if3','if5','if7','ff1','ff2','ff3','ff5','ff7']);

      for (const [id, tex] of Object.entries({...ifMath, ...ffMath})) {
        const el = document.getElementById(id);
        if (el) katex.render(tex, el, { displayMode: displayIds.has(id) });
      }

      document.getElementById('formulas-if').style.opacity = '1';
      document.getElementById('formulas-ff').style.opacity = '1';
    }

    if (window.katex) renderMath();
    else window.addEventListener('load', () => window.katex && renderMath());

    // Layout
    const formulaSpecsIf = [
      { id: 'if1', ax: 0.2, ay: 0.35, rx: 0.15, ry: 0.1, rot: -0.02, speed: 0.8 },
      { id: 'if2', ax: 0.8, ay: 0.28, rx: 0.1,  ry: 0.08, rot: 0.03, speed: 1.1 },
      { id: 'if3', ax: 0.2, ay: 0.7,  rx: 0.12, ry: 0.05, rot: 0.01, speed: 0.9 },
      { id: 'if4', ax: 0.8, ay: 0.5,  rx: 0.08, ry: 0.08, rot: 0.04, speed: 1.3 },
      { id: 'if5', ax: 0.5, ay: 0.85, rx: 0.1,  ry: 0.06, rot: 0, speed: 0.7 },
      { id: 'if6', ax: 0.15, ay: 0.15, rx: 0.05, ry: 0.05, rot: -0.03, speed: 1.0 },
      { id: 'if7', ax: 0.5, ay: 0.5, rx: 0.1, ry: 0.1, rot: 0, speed: 0.5 }
    ];

    const formulaSpecsFf = [
      { id: 'ff1', ax: 0.2, ay: 0.35, rx: 0.15, ry: 0.1, rot: 0.02, speed: 0.85 },
      { id: 'ff2', ax: 0.8, ay: 0.28, rx: 0.1,  ry: 0.08, rot: -0.03, speed: 1.05 },
      { id: 'ff3', ax: 0.2, ay: 0.7,  rx: 0.12, ry: 0.05, rot: -0.01, speed: 0.95 },
      { id: 'ff4', ax: 0.8, ay: 0.5,  rx: 0.08, ry: 0.08, rot: -0.04, speed: 1.25 },
      { id: 'ff5', ax: 0.5, ay: 0.85, rx: 0.1,  ry: 0.06, rot: 0, speed: 0.75 },
      { id: 'ff6', ax: 0.85, ay: 0.15, rx: 0.05, ry: 0.05, rot: 0.03, speed: 1.1 },
      { id: 'ff7', ax: 0.5, ay: 0.5, rx: 0.1, ry: 0.1, rot: 0, speed: 0.55 }
    ];

    function layoutFormulas(t, specs, w, h) {
      for (const s of specs) {
        const el = document.getElementById(s.id);
        if (!el) continue;
        const x = (s.ax + s.rx * Math.sin(t * 0.0007 * s.speed + s.ax * 7)) * w;
        const y = (s.ay + s.ry * Math.cos(t * 0.0008 * s.speed + s.ay * 7)) * h;
        const r = s.rot + 0.05 * Math.sin(t * 0.0005 + s.ay * 5);
        const op = 0.85 - 0.15 * Math.abs(Math.sin(t * 0.0009 + s.ax * 9));
        el.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${r}rad)`;
        el.style.opacity = op;
      }
    }

    // Canvas drawing logic
    const cvIf = document.getElementById('canvas-if');
    const ctxIf = cvIf.getContext('2d');
    const cvFf = document.getElementById('canvas-ff');
    const ctxFf = cvFf.getContext('2d');

    let w, h;
    function resize() {
      w = window.innerWidth / 2;
      h = window.innerHeight;
      cvIf.width = w; cvIf.height = h;
      cvFf.width = w; cvFf.height = h;
    }
    window.addEventListener('resize', resize);
    resize();

    // Reusable axis drawer
    function drawAxis(ctx, cx, cy, angle, length, opts) {
      const {
        color = "#ffffff", width = 3, alpha = 0.5, tickEvery = 50, tickSize = 6,
        arrow = true, label = "", labelOffset = 20, dashed = false
      } = opts || {};

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      ctx.beginPath();
      ctx.moveTo(-length, 0);
      ctx.lineTo(length, 0);
      ctx.lineWidth = width;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      if (dashed) ctx.setLineDash([8, 8]);
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      // Arrow
      if (arrow) {
        const ah = width * 3;
        const aw = width * 2;
        ctx.beginPath();
        ctx.moveTo(length, 0); ctx.lineTo(length - ah, aw); ctx.lineTo(length - ah, -aw);
        ctx.fillStyle = color; ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-length, 0); ctx.lineTo(-length + ah, aw); ctx.lineTo(-length + ah, -aw);
        ctx.fill();
      }

      // Label
      if (label) {
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = color;
        ctx.font = `bold 20px Segoe UI, sans-serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText(label, length + labelOffset, 0);
      }

      ctx.restore();
    }

    function drawLightCone(ctx, w, h, color) {
      const cx = w/2, cy = h/2;
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      // standard symmetric lightcone (45 deg)
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx - h/2.2, cy - h/2.2);
      ctx.lineTo(cx + h/2.2, cy - h/2.2);
      ctx.closePath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx - h/2.2, cy + h/2.2);
      ctx.lineTo(cx + h/2.2, cy + h/2.2);
      ctx.closePath();
      
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function drawMinkowskiGrid(ctx, w, h, angle1, angle2, color) {
      const cx = w/2, cy = h/2;
      const maxR = Math.max(w, h);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.strokeStyle = color;
      ctx.globalAlpha = 0.08;
      ctx.lineWidth = 1.5;

      const step = 40;
      const count = Math.ceil(maxR / step);

      // Lines parallel to angle1
      for (let i = -count; i <= count; i++) {
        const offset = i * step;
        ctx.beginPath();
        const nx = Math.cos(angle1 + Math.PI/2);
        const ny = Math.sin(angle1 + Math.PI/2);
        const px = offset * nx, py = offset * ny;
        const dx = Math.cos(angle1) * maxR, dy = Math.sin(angle1) * maxR;
        ctx.moveTo(px - dx, py - dy);
        ctx.lineTo(px + dx, py + dy);
        ctx.stroke();
      }

      // Lines parallel to angle2
      for (let i = -count; i <= count; i++) {
        const offset = i * step;
        ctx.beginPath();
        const nx = Math.cos(angle2 + Math.PI/2);
        const ny = Math.sin(angle2 + Math.PI/2);
        const px = offset * nx, py = offset * ny;
        const dx = Math.cos(angle2) * maxR, dy = Math.sin(angle2) * maxR;
        ctx.moveTo(px - dx, py - dy);
        ctx.lineTo(px + dx, py + dy);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTimeEvolutionDir(ctx, w, h, angle, color) {
      const cx = w/2, cy = h/2;
      const len = Math.min(w, h) * 0.45;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      // Thick pulsing arrow
      ctx.shadowColor = color;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 6;
      ctx.globalAlpha = 0.5 + 0.3 * Math.sin(performance.now() * 0.003);

      ctx.beginPath();
      ctx.moveTo(40, 0); // start a bit away from center
      ctx.lineTo(len - 10, 0);
      ctx.stroke();

      // Arrow head
      ctx.beginPath();
      ctx.moveTo(len + 15, 0);
      ctx.lineTo(len - 15, 12);
      ctx.lineTo(len - 15, -12);
      ctx.fill();

      // Text Label
      ctx.globalAlpha = 0.9;
      ctx.font = 'bold 20px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.shadowBlur = 0;
      ctx.fillText("Time Evolution", len / 2 + 20, -18);

      ctx.restore();
    }

    // Instant Form: Horizontal planes moving upwards
    function drawInstantPlanes(ctx, t, w, h) {
      const cx = w/2, cy = h/2;
      const period = 3000;
      const timeMod = t % period;
      
      for(let i=0; i<3; i++) {
        const pT = (t + i * period/3) % period;
        const frac = pT / period; // 0 to 1
        // moving from bottom to top
        const yOffset = lerp(h/2.5, -h/2.5, frac);
        
        ctx.save();
        ctx.translate(cx, cy + yOffset);
        // perspective tilt for horizontal plane
        ctx.scale(1, 0.4); 
        
        ctx.beginPath();
        const planeW = h/3 + (0.5 - Math.abs(frac - 0.5)) * h/2; // width widens in middle
        ctx.rect(-planeW, -planeW, planeW*2, planeW*2);
        
        const grad = ctx.createLinearGradient(0, -planeW, 0, planeW);
        grad.addColorStop(0, "rgba(138, 255, 178, 0.05)");
        grad.addColorStop(0.5, "rgba(138, 255, 178, 0.3)");
        grad.addColorStop(1, "rgba(138, 255, 178, 0.05)");
        
        ctx.fillStyle = grad;
        ctx.globalAlpha = Math.sin(frac * Math.PI) * 0.8;
        ctx.fill();
        
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(138, 255, 178, 0.8)";
        ctx.stroke();
        
        ctx.restore();
      }
    }

    // Front Form: 45 degree planes moving along 45 degree axis
    function drawFrontPlanes(ctx, t, w, h) {
      const cx = w/2, cy = h/2;
      const period = 3000;
      
      for(let i=0; i<3; i++) {
        const pT = (t + i * period/3) % period;
        const frac = pT / period;
        
        // moves along the 45 degree axis (x^+), so x and y change together
        const dist = lerp(-h/2.2, h/2.2, frac);
        const ang = -Math.PI/4; // along x^+
        const xOffset = dist * Math.cos(ang);
        const yOffset = dist * Math.sin(ang);
        
        ctx.save();
        ctx.translate(cx + xOffset, cy + yOffset);
        // plane is parallel to x^-, so it's tilted at 45 deg the other way (Math.PI/4)
        ctx.rotate(Math.PI/4);
        // stretch along transverse
        ctx.scale(1, 0.25);
        
        ctx.beginPath();
        const planeW = h/3 + (0.5 - Math.abs(frac - 0.5)) * h/2.5; 
        ctx.rect(-planeW, -planeW, planeW*2, planeW*2);
        
        const grad = ctx.createLinearGradient(0, -planeW, 0, planeW);
        grad.addColorStop(0, "rgba(42, 195, 249, 0.05)");
        grad.addColorStop(0.5, "rgba(42, 195, 249, 0.3)");
        grad.addColorStop(1, "rgba(42, 195, 249, 0.05)");
        
        ctx.fillStyle = grad;
        ctx.globalAlpha = Math.sin(frac * Math.PI) * 0.8;
        ctx.fill();
        
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(42, 195, 249, 0.8)";
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawParticlesIF(ctx, t, w, h) {
      const cx = w/2, cy = h/2;
      for(let i=0; i<8; i++) {
        const timeOffset = t/1000 + i;
        // particles moving upwards (time) and oscillating (z)
        const py = cy + Math.sin(timeOffset*0.5)*h/3;
        const px = cx + Math.sin(timeOffset*1.2 + i)*w/4;
        
        ctx.beginPath();
        ctx.arc(px, py, 6 + Math.sin(t/500 + i)*2, 0, Math.PI*2);
        ctx.fillStyle = "#e0ffd4";
        ctx.shadowColor = "#8affb2";
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function drawParticlesFF(ctx, t, w, h) {
      const cx = w/2, cy = h/2;
      for(let i=0; i<8; i++) {
        const timeOffset = t/1000 + i;
        // particles moving along 45 deg. (x^+) and oscillating in perp direction (x^-)
        const dPlus = Math.sin(timeOffset*0.5)*h/3;
        const dMinus = Math.sin(timeOffset*1.2 + i)*w/4;
        
        const px = cx + dPlus*Math.cos(-Math.PI/4) + dMinus*Math.cos(Math.PI/4);
        const py = cy + dPlus*Math.sin(-Math.PI/4) + dMinus*Math.sin(Math.PI/4);
        
        ctx.beginPath();
        ctx.arc(px, py, 6 + Math.sin(t/500 + i)*2, 0, Math.PI*2);
        ctx.fillStyle = "#ecfffdbb";
        ctx.shadowColor = "#2ac3f9";
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function animate() {
      const t = performance.now();
      
      // Clear panes
      ctxIf.clearRect(0, 0, w, h);
      ctxFf.clearRect(0, 0, w, h);

      // --- Instant Form (Left) ---
      const cx = w/2, cy = h/2;
      drawMinkowskiGrid(ctxIf, w, h, -Math.PI/2, 0, "#8affb2");
      drawLightCone(ctxIf, w, h, "#8affb255");
      // t axis (up)
      drawAxis(ctxIf, cx, cy, -Math.PI/2, Math.min(w,h)*0.6, { color: '#8affb2', width: 4, label: 't (x⁰)', labelOffset: 15 });
      // z axis (right)
      drawAxis(ctxIf, cx, cy, 0, Math.min(w,h)*0.6, { color: '#b5f5c9', width: 3, dashed: true, label: 'z (x³)' });
      drawInstantPlanes(ctxIf, t, w, h);
      drawParticlesIF(ctxIf, t, w, h);
      drawTimeEvolutionDir(ctxIf, w, h, -Math.PI/2, "#8affb2");

      // --- Front Form (Right) ---
      drawMinkowskiGrid(ctxFf, w, h, -Math.PI/4, Math.PI/4, "#2ac3f9");
      drawLightCone(ctxFf, w, h, "#2ac3f955");
      // x^+ axis (45 deg along light cone)
      drawAxis(ctxFf, cx, cy, -Math.PI/4, Math.min(w,h)*0.6, { color: '#ecfffdbb', width: 4, label: 'x⁺', labelOffset: 20 });
      // x^- axis (perpendicular)
      drawAxis(ctxFf, cx, cy, Math.PI/4, Math.min(w,h)*0.6, { color: '#2ac3f9aa', width: 3, dashed: true, label: 'x⁻' });
      drawFrontPlanes(ctxFf, t, w, h);
      drawParticlesFF(ctxFf, t, w, h);
      drawTimeEvolutionDir(ctxFf, w, h, -Math.PI/4, "#2ac3f9");

      // Layout formulae
      layoutFormulas(t, formulaSpecsIf, w, h);
      layoutFormulas(t, formulaSpecsFf, w, h);

      requestAnimationFrame(animate);
    }
    
    requestAnimationFrame(animate);
  </script>
</body>
</html>
