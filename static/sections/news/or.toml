details = "** କ ଞ୍ଜ ا ହ ହ ଞ୍ଜ ହ ଞ୍ଜ ହ୍\n** | |\n\n** كان :: :: **\n- ଖଜ ଆଜ ଆଜ ଆଜ ଆଜାନ ଏଜ ଆଜ ଆଜ ଏଜ ଆଜ (TIFR, ମୁଜ ଆଜ ଆଜ ଆଜ,\n|\n|\n-\n\n** କ ୍ରା ୍ରା ୍ରା ୍ରା ୍ରା ୍ରା ୍ରା\nପୋଷ୍ଟଡକ୍ଟରାଲ୍ ସାଥୀ ଏବଂ ଉନ୍ନତ ତତ୍ତ୍ୱିକ କଣିକା ପଦାର୍ଥ ବିଜ୍ଞାନ ଛାତ୍ରମାନଙ୍କୁ ଏକ୍ସପୋଜର / ତାଲିମ ପ୍ରଦାନ କରିବା ହେଉଛି SATPP ର ଉଦ୍ଦେଶ୍ୟ | ଲକ୍ଷ୍ୟ କେବଳ ଧାରଣା / ଯନ୍ତ୍ରର ସ୍ପେକ୍ଟ୍ରମର ସବିଶେଷ ତଥ୍ୟ ପ୍ରଦାନ କରିବା ନୁହେଁ ବରଂ ଅତ୍ୟାବଶ୍ୟକ ବ technical ଷୟିକ ଉପକରଣ ଯୋଗାଇବା ଯାହାକି ଯୁବ ଅନୁସନ୍ଧାନକାରୀଙ୍କୁ ସମାଲୋଚକ ଏବଂ ଗଠନମୂଳକ ଚିନ୍ତା କରିବାକୁ ଅନୁମତି ଦେବ |\n\nଏହି ଦ୍ୱିତୀୟ ସଂସ୍କରଣ, \"ପ୍ରଭାବଶାଳୀ କ୍ଷେତ୍ର ଥିଓରୀ (EFTs) ରେ ମନୋନୀତ ବିଷୟଗୁଡିକ\" ଦୁଇ ସପ୍ତାହ ବ୍ୟାପିଥିଲା \u200b\u200b\u200b\u200b\u200b\u200b| ପ୍ରଥମ ସପ୍ତାହ ସ୍ୱଳ୍ପ ଶକ୍ତି EFT ଏବଂ ଦ୍ୱିତୀୟ ସପ୍ତାହ ଉଚ୍ଚ ଶକ୍ତି EFT ଉପରେ ଧ୍ୟାନ ଦେଇଥିଲା | ଏଫ୍ ଏଫ୍ ଏର ଆଜ୍ ଏଜାନ ଏଜାନ ଏଜାନ ଏଜାନ ଏଜାନ ଏଜାନ ଏଗାନ ଏଜ ଏଜ ଆଜ ଏଙ୍ଗ ଆଙ୍ଗ ଏଙ୍ଗ ୟା ୟା ୟା ୟା, ୟା,, ଏର ଏଜ ଏସ ଏଜ ଏଜ ଏର ଏବ ଏର ଏର ଏଫ୍\n\n** ଗ ୍ରା ୍ରା ୍ରା ୍ରା ୍ରା ୍ରା  \n[https://www.icts.res.in/program/satpp2026)(https://www.icts.res.in/program/satpp2026)"

