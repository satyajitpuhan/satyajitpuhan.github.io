image = "images/blog/posts/crji-seminar.png"
title = "ପାୟନ GPD ନିଷ୍କାସନ — ପ୍ରଫେସର ସି ଆର ଜିଙ୍କ ଗୋଷ୍ଠୀରେ ସେମିନାର (NCSU, ଆମେରିକା)"
date = "୧୭ ଏପ୍ରିଲ, ୨୦୨୬"
description = "IOP, ଆକାଡେମିଆ ସିନିକାରୁ ଜୁମ୍ ମାଧ୍ୟମରେ ପ୍ରଫେସର ସି ଆର ଜିଙ୍କ ଅନୁସନ୍ଧାନ ଗୋଷ୍ଠୀ, ନର୍ଥ କାରୋଲିନା ଷ୍ଟେଟ୍ ୟୁନିଭର୍ସିଟିରେ 'ପାୟନ GPD ନିଷ୍କାସନ' ଉପରେ ଏକ ସେମିନାର ଉପସ୍ଥାପନ କରିଥିଲେ। ଶୂନ୍ୟ ସ୍କୁନେସ୍ ରେ ପାୟନ GPDs ର ଡାଟା-ଚାଳିତ ନିଷ୍କାସନ, ଇମ୍ପାକ୍ଟ-ପ୍ୟାରାମିଟର-ସ୍ପେସ୍ ବ୍ୟାଖ୍ୟା, ଏବଂ EIC, JLab, COMPASS, ଏବଂ AMBER ପରୀକ୍ଷଣ ପାଇଁ ପ୍ରଭାବ ଆଲୋଚନା କରାଯାଇଥିଲା।"

