image = "images/gallery/iitb-cteq-group.jpg"
title = "2026 IITB-CFNS-CTEQ ଗୁଜାର ଆଜ | |"
date = "Feb 8–15, 2026"
description = "ଷ୍ଟୋନି ବ୍ରୁକ୍ ବିଶ୍ୱବିଦ୍ୟାଳୟର CTEQ ସହଯୋଗ ଏବଂ CFNS ସହଯୋଗରେ ଇଣ୍ଡିଆନ୍ ଇନଷ୍ଟିଚ୍ୟୁଟ୍ ଅଫ୍ ଟେକ୍ନୋଲୋଜି ବମ୍ବେ (IITB) ଦ୍ୱାରା ଆୟୋଜିତ ବିଦ୍ୟାଳୟରେ ଅଂଶଗ୍ରହଣ କରିଥିଲେ | ପାଠ୍ୟକ୍ରମରେ ପର୍ଟର୍ବେଟିଭ୍ କ୍ୱାଣ୍ଟମ୍ କ୍ରୋମୋଡାଇନାମିକ୍ସ, ପରୀକ୍ଷାମୂଳକ ଫଳାଫଳ ଏବଂ ମୋଣ୍ଟେ କାର୍ଲୋ ଇଭେଣ୍ଟ ଜେନେରେଟର ଉପରେ ହ୍ୟାଣ୍ଡ-ଅନ୍ ଟ୍ୟୁଟୋରିଆଲ୍ ଗୁଡ଼ିକ ଅନୁସନ୍ଧାନ କରାଯାଇଥିଲା |"
extra_images = [ "images/gallery/iitb-cteq-fun.jpg", "images/gallery/iitb-cteq-gateway.jpg", "images/gallery/iitb-cteq-poster.jpg",]
details = "Г\n\nଗିରିଙ୍ଗ\n\nଉନ୍ନତ ସ୍ନାତକ ଛାତ୍ର, ପୋଷ୍ଟଡୋକସ୍ ଏବଂ ଜୁନିଅର ଅଧ୍ୟାପିକାମାନଙ୍କ ପାଇଁ ଏହି ବିଦ୍ୟାଳୟଟି ଉପଯୁକ୍ତ ଅଟେ, ଯେଉଁଥିରେ ଏକ ପାଠ୍ୟକ୍ରମ ସହିତ ପର୍ଟବର୍ଟିଭ୍ କ୍ୱାଣ୍ଟମ୍ କ୍ରୋମୋଡାଇନାମିକ୍ସ ସହିତ ଏକ ଧ୍ୟାନର ପରିଚୟ, ପ୍ରୟୋଗ ଏବଂ ସାମ୍ପ୍ରତିକ ପରୀକ୍ଷାମୂଳକ ଫଳାଫଳ ଅନ୍ତର୍ଭୁକ୍ତ | ଏହା ମୋଣ୍ଟେ କାର୍ଲୋ ଇଭେଣ୍ଟ ଜେନେରେଟର ଉପରେ “ହ୍ୟାଣ୍ଡ-ଅନ୍” ଟ୍ୟୁଟୋରିଆଲ୍ ଅଧିବେଶନ ମଧ୍ୟ ପ୍ରଦାନ କରିବ |\n\n** କ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ\nଅସ୍ମିତା ମୁଖାର୍ଜୀ, ଭି ରବିନ୍ଦ୍ରନ୍, ଅଭୟ ଦେଶପାଣ୍ଡେ, ରସ୍ କର୍ଲିସ୍, ହୁଇ-ୱେନ୍ ଲିନ୍, ଜ୍ୟାକ୍ ସଲିଭାନ୍, ଫ୍ରେଡ୍ ଓଲେନ୍ସ\n\n** କ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ\nଅସ୍ମିତା ମୁଖାର୍ଜୀ, ମଣିବ୍ରତା ସେନ୍, ବିକ୍ରମ ରେଣ୍ଟାଲା, ଦେବଜିତ୍ ସାର୍କ |\n\n....\n- зар чан чан чу у уд (зин к\n,\n|\n|\n|\n|\n|\n|\n- ମାଇଁ ଚାମକମା ଚାନ୍କ ଆଜ ଆଜାନ ଆଜଜ ଆଜ ଆଜ ଆଜ (IMSC)\n- ସ ବବ ୀରୀର\n- କ ଜଜଜ ଚ ଚ ାନୁ\n- କୱାର ଚ ଚ ଚାନୁ ାନୁ ଚୁ\n- କିଜ ଆଙ୍ଗଗ ଆଙ୍ଗି ଚିନ ଆଜିନୀ (କୁଜ ଆଜ ଆଜ-ଆଜକ ଆଜିକା)\n\n** କ ଗୁଡ ଗୁଡ ଗୁଡ ଗୁଡ ଗୁଡ ଗୁଡ\n|\n- CTEQ ଆସା ଆଜୁରା | | | |\n- କାନ ିତ ିତ ିତ ا ا ا\n- ଆଜାନ зан ч у ч чан чан ିକ ିକ ڭ ିକ ڭ ڭ ڭ ڭ ڭ ڭ ا ا ا ا ا\n|"

