details = "Г\n\nଗିରି\n\nଉନ୍ନତ ସ୍ନାତକ ଛାତ୍ର, ପୋଷ୍ଟଡୋକସ୍ ଏବଂ ଜୁନିଅର ଅଧ୍ୟାପିକାମାନଙ୍କ ପାଇଁ ଏହି ବିଦ୍ୟାଳୟଟି ଉପଯୁକ୍ତ ଅଟେ, ଯେଉଁଥିରେ ଏକ ପାଠ୍ୟକ୍ରମ ସହିତ ପର୍ଟବର୍ଟିଭ୍ କ୍ୱାଣ୍ଟମ୍ କ୍ରୋମୋଡାଇନାମିକ୍ସ ସହିତ ଏକ ଧ୍ୟାନର ପରିଚୟ, ପ୍ରୟୋଗ ଏବଂ ସାମ୍ପ୍ରତିକ ପରୀକ୍ଷାମୂଳକ ଫଳାଫଳ ଅନ୍ତର୍ଭୁକ୍ତ | ଏହା ମୋଣ୍ଟେ କାର୍ଲୋ ଇଭେଣ୍ଟ ଜେନେରେଟର ଉପରେ “ହ୍ୟାଣ୍ଡ-ଅନ୍” ଟ୍ୟୁଟୋରିଆଲ୍ ଅଧିବେଶନ ମଧ୍ୟ ପ୍ରଦାନ କରିବ |\n\n** କ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ\nଅସ୍ମିତା ମୁଖାର୍ଜୀ, ଭି ରବିନ୍ଦ୍ରନ୍, ଅଭୟ ଦେଶପାଣ୍ଡେ, ରସ୍ କର୍ଲିସ୍, ହୁଇ-ୱେନ୍ ଲିନ୍, ଜ୍ୟାକ୍ ସଲିଭାନ୍, ଫ୍ରେଡ୍ ଓଲେନ୍ସ\n\n** କ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ ଆୟ\nଅସ୍ମିତା ମୁଖାର୍ଜୀ, ମଣିବ୍ରତା ସେନ୍, ବିକ୍ରମ ରେଣ୍ଟାଲା, ଦେବଜିତ୍ ସାର୍କ |\n\n....\n- зар чан чан чу у уд (зин к\n,\n|\n|\n|\n|\n|\n|\n- ମାଇଁ ଚାମକମା ଚାନ୍କ ଆଜ ଆଜାନ ଆଜଜ ଆଜ ଆଜ ଆଜ (IMSC)\n- ସ ବବ ୀରୀର\n- କ ଜଜଜ ଚ ଚ ାନୁ\n- କୱାର ଚ ଚ ଚାନୁ ାନୁ ଚୁ\n- କିଜ ଆଙ୍ଗଗ ଆଙ୍ଗି ଚିନ ଆଜିନୀ (କୁଜ ଆଜ ଆଜ-ଆଜକ ଆଜିକା)\n\n** କ ଗୁଡ ଗୁଡ ଗୁଡ ଗୁଡ ଗୁଡ ଗୁଡ\n|\n- CTEQ ଆଜାର | | |\n- କାନ୍ ିତ ିତ ିତ ا\n- ଆସା କାନ уг чан чан ିକ ିକ ିକ ିକ ିକ ିକ ିକ ا ا ا ا ا\n|"

