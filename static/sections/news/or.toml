title = "ଶାରୀରିକ ସମୀକ୍ଷା D ରେ ପ୍ରକାଶିତ ସାମ୍ପ୍ରତିକ କାଗଜ |"
date = "27 Feb, 2026"
description = "ଆମର ସାମ୍ପ୍ରତିକ କାଗଜ 'ହାଲୁକା ସାମ୍ନା କ୍ୱାର୍କ ମଡେଲ ବ୍ୟବହାର କରି ରୋ ମେସନର ଭାଲେନ୍ସ କ୍ୱାର୍କ ବଣ୍ଟନ' Phys. Rev. D 113, 036030 (2026)"
details = "....\n** ଚ:  \n** କାନ кин ିକା ز زار زان ار ڭ نى ڭ ڭ ڭ: **: **:  \n** କ ତାରିଖ ତାରିଖ ତାରିଖ ତାରିଖ  \n** DOI: ** [10.1103 / xjkc-l5tr] (https://journals.aps.org/prd/abstract/10.1103/xjkc-l5tr)\n\n** କ ଜଜଜ ାରାର ାର (arXiv): **\nଆମେ ହାଲୁକା ସାମ୍ନା କ୍ୱାର୍କ ମଡେଲ୍ (LFQM) ମଧ୍ୟରେ ହାଲୁକା ସ୍ପିନ୍ -1 ଭେକ୍ଟର ମେସନ୍ ρ ମେସନ୍ ର ପାର୍ଟୋନିକ୍ ଗଠନ ଅନୁସନ୍ଧାନ କରୁ | ମଡେଲ୍ ଅନୁମାନ ପ୍ରତି ସମ୍ବେଦନଶୀଳତା ଅନୁସନ୍ଧାନ କରିବାକୁ, ଆମେ LFQM ରେ ଦୁଇଟି ଭିନ୍ନ ପ୍ରକାରର ସ୍ପିନ୍ ତରଙ୍ଗ କାର୍ଯ୍ୟ ନିୟୋଜିତ କରୁ | ହାଲୁକା ସାମ୍ମୁଖ୍ୟ ହେଲିସିଟି ତରଙ୍ଗ କାର୍ଯ୍ୟଗୁଡିକ ବ୍ୟବହାର କରି, ଆମେ ଅଗ୍ରଣୀ-ଟ୍ୱିଷ୍ଟ୍ ଏବଂ ସବ୍ଲିଡିଂ-ଟ୍ୱିଷ୍ଟ୍ କ୍ୱାର୍କ ପାର୍ଟନ୍ ବଣ୍ଟନ କାର୍ଯ୍ୟ (ପିଡିଏଫ୍) ପାଇଁ ସ୍ପଷ୍ଟ ଅଭିବ୍ୟକ୍ତି ପାଇଥାଉ ଏବଂ ପରବର୍ତ୍ତୀ-ଅଗ୍ରଣୀ କ୍ରମ (NLO) ଡୋକଶିଟର୍ - ଗ୍ରିବୋଭ୍ - ଲିପାଟୋଭ୍ - ଆଲ୍ଟାରେଲି - ପ୍ୟାରିସି (DGLAP) ବିବର୍ତ୍ତନ ପାଇଁ ଆମେ ସ୍ପଷ୍ଟ-ଅଭିବ୍ୟକ୍ତି ପାଇଥାଉ | ଏକ ସରଳ ସ୍ନାୟୁ ନେଟୱାର୍କ ଫ୍ରେମ୍ ବ୍ୟବହାର କରି ବିକଶିତ PDF ରୁ ମେଲିନ୍ ମୁହୂର୍ତ୍ତକୁ ମଧ୍ୟ ହିସାବ କରିଛୁ ଏବଂ ଉପଲବ୍ଧ ତତ୍ତ୍ୱିକ ପୂର୍ବାନୁମାନ ସହିତ ତୁଳନା କରିଛୁ | Зир,"

