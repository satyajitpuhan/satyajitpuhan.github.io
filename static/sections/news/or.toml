extra_images = [ "images/gallery/rho-meson-spectroscopy-1.png", "images/gallery/rho-meson-spectroscopy-2.png",]
details = "....\n** ଚ:  \n** କ ତାରିଖ ତାରିଖ ତାରିଖ ତାରିଖ ତାରିଖ ତାରିଖ  \n** କ ଜଜଜ ଜଜ ୱ\n\n** କ ଜଜଜ ାରାର ାର (arXiv): **\nଏହି କାର୍ଯ୍ୟରେ, ଶୂନ୍ୟ ତାପମାତ୍ରାରେ ଏକ ସମୃଦ୍ଧ ଆଣବିକ ମାଧ୍ୟମର ଉପସ୍ଥିତିରେ ଆମେ ଆଲୋକ ଭେକ୍ଟର ρ ମେସନର ଆଚରଣ ଅନୁସନ୍ଧାନ କରୁ | За зан за DAs зан зар зан з з ч ч ч ч ч з а ч а з а з а з а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а ଡିଏସ୍ ର ବିବର୍ତ୍ତନ ଅଗ୍ରଣୀ କ୍ରମ (LO) ଇଫ୍ରେମୋଭ୍-ରାଡୁସ୍କିନ୍-ବ୍ରୋଡସ୍କି-ଲେପେଜ୍ ପଦ୍ଧତି ଦ୍ୱାରା ପରିଚାଳିତ ଏବଂ ଉପଲବ୍ଧ ଭବିଷ୍ୟବାଣୀ ସହିତ ତୁଳନା କରାଯାଏ | Ρ- ଆସା аса аса а ка а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а а А а ଆମେ ଜାଣିବାକୁ ପାଇଲୁ ଯେ ଆଣବିକ ମାଧ୍ୟମ ଜନତା, ଦୁର୍ବଳ କ୍ଷୟ ସ୍ଥିର, କ୍ଷୟ ପ୍ରସ୍ଥ ଏବଂ ρ ମେସନର ବିତରଣ ବିସ୍ତାର ଉପରେ ପ୍ରଶଂସନୀୟ ପରିବର୍ତ୍ତନ ଆଣିଥାଏ | У,"

