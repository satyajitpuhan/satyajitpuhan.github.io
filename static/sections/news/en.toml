[[items]]
top_title = "📄 New Preprint!"
image = "images/portfolio/papers/pion-gpd-form-factors.png"
title = "Extraction of Pion Unpolarized Quark Generalized Parton Distribution from Charge Form Factors"
date = "April 13, 2026"
description = "New preprint on arXiv! We report a data-driven determination of the unpolarized quark GPDs of the pion at zero skewness via a global fit to electromagnetic form factor and PDF data, providing impact-parameter-space interpretations and essential input for EIC, JLab 12 GeV, COMPASS, and AMBER experiments."
details = """
**📄 New Preprint on arXiv!**

**Title:** Extraction of Pion Unpolarized Quark Generalized Parton Distribution from Charge Form Factors
**Authors:** Satyajit Puhan (Taiwan, Inst. Phys.), Shubham Sharma (Moscow, ITEP & MIPT), Narinder Kumar (Ambedkar NIT & M.N. College), Harleen Dahiya (Ambedkar NIT)
**e-Print:** [2604.11116 [hep-ph]](https://arxiv.org/abs/2604.11116)

---

### Key Highlights

- 🔹 **Data-driven extraction** of pion unpolarized quark GPDs at zero skewness (ξ = 0) from a global fit to experimental pion form factor and PDF measurements
- 🔹 **Flexible form factor parameterization** embedded into a GPD framework with collinear PDFs and a profile function encoding transverse dynamics
- 🔹 **Impact-parameter-space interpretations** — spatial parton distributions revealing the internal structure of the lightest QCD bound state
- 🔹 **Essential input for future experiments** — EIC Sullivan process, JLab 12 GeV exclusive π⁺ electroproduction, COMPASS, and AMBER pion-beam experiments
- 🔹 **Lattice QCD connections** — results provide benchmarks for phenomenological and lattice investigations of meson structure

### Significance

This work provides a unified description of the pion's electromagnetic structure and spatial parton distributions, bridging global QCD fits with next-generation collider and fixed-target experiments.

---

*#PionGPDs #FormFactor #ImpactParameter #SullivanProcess #EIC #JLab #COMPASS #AMBER #QCD*
"""

