# PhD in High Energy Physics 🎓

Successfully defended my PhD thesis on *Tomography of Light & Heavy Mesons Using Light-Front Dynamics* at NIT Jalandhar on **2nd April, 2026**. With **25 publications** in Physical Review D, JHEP, and leading journals — and national ranks of **AIR-877 (JAM)** and **AIR-209 (JEST)** — I bridge first-principles QCD with observable meson structure at future colliders like the EIC and NICA.
